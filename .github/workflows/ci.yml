name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  structure-and-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Repo hygiene
        run: npm run ci:hygiene

      - name: Validate architecture structure
        run: npm run ci:structure

  tenant-safety:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Run tests
        run: npm run test -- --reporter=dot

      - name: Tenant guard & query scope checks (STRICT)
        run: npm run ci:strict
