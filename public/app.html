<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>ESSKULTUR Staff App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      overflow: hidden;
    }

    :root {
      --brand: #A54A7B;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      
      --s-pending: #f59e0b;
      --s-confirmed: #3b82f6;
      --s-arrived: #8b5cf6;
      --s-noshow: #ef4444;
      --s-done: #10b981;
      --s-cancelled: #6b7280;
    }

    /* LOGIN SCREEN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--brand) 0%, #6b2c5f 100%);
    }

    .login-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .login-card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
      text-align: center;
    }

    .login-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }

    .login-form input::placeholder {
      color: var(--muted);
    }

    .login-form input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(165, 74, 123, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--brand);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: #9a3c6d;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fecaca;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    /* APP SCREEN */
    .app-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .app-header h2 {
      font-size: 1.1rem;
      flex: 1;
    }

    .app-header small {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .settings-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text);
      color: var(--text);
    }

    /* FEED */
    .app-feed {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      gap: 1rem;
      display: flex;
      flex-direction: column;
    }

    .mobile-summary {
      padding: 0.85rem 1rem 0;
      display: grid;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(15, 23, 42, 0.94) 100%);
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }

    .quick-actions-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.1rem;
    }

    .service-date-row {
      display: grid;
      grid-template-columns: auto 1fr minmax(0, 160px) auto auto;
      gap: 0.5rem;
      align-items: center;
    }

    .service-shortcuts-row {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .service-date-btn {
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(30, 41, 59, 0.88);
      color: var(--text);
      border-radius: 10px;
      padding: 0.6rem 0.8rem;
      font-size: 0.78rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .service-date-btn.has-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .service-date-count {
      min-width: 1.2rem;
      padding: 0.1rem 0.35rem;
      border-radius: 999px;
      background: rgba(165, 74, 123, 0.18);
      border: 1px solid rgba(165, 74, 123, 0.28);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
    }

    .service-shortcut-btn {
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(30, 41, 59, 0.88);
      color: var(--text);
      border-radius: 999px;
      padding: 0.45rem 0.75rem;
      font-size: 0.74rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .service-shortcut-btn.active {
      border-color: rgba(165, 74, 123, 0.7);
      background: rgba(165, 74, 123, 0.18);
    }

    .service-date-btn.active {
      border-color: rgba(165, 74, 123, 0.7);
      background: rgba(165, 74, 123, 0.18);
    }

    .service-date-label {
      min-width: 0;
      background: rgba(30, 41, 59, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      display: grid;
      gap: 0.15rem;
    }

    .service-date-label strong {
      font-size: 0.86rem;
      color: var(--text);
    }

    .service-date-label span {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .service-date-input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(30, 41, 59, 0.88);
      color: var(--text);
      border-radius: 10px;
      padding: 0.6rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .service-date-input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.8;
      cursor: pointer;
    }

    .quick-action-btn {
      border: 1px solid rgba(165, 74, 123, 0.45);
      background: rgba(165, 74, 123, 0.14);
      color: var(--text);
      border-radius: 999px;
      padding: 0.65rem 0.9rem;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }

    .quick-action-btn:hover {
      border-color: rgba(165, 74, 123, 0.7);
      background: rgba(165, 74, 123, 0.2);
    }

    .quick-action-btn.active {
      border-color: rgba(59, 130, 246, 0.7);
      background: rgba(59, 130, 246, 0.18);
      color: #dbeafe;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.6rem;
    }

    .operations-focus {
      display: grid;
      gap: 0.55rem;
      padding: 0.85rem 0.95rem;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.16) 0%, rgba(15, 23, 42, 0.92) 100%);
      border: 1px solid rgba(59, 130, 246, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .operations-focus-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
    }

    .operations-focus-label {
      font-size: 0.7rem;
      color: #bfdbfe;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }

    .operations-focus-state {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 700;
    }

    .operations-focus-title {
      font-size: 1rem;
      color: var(--text);
      font-weight: 800;
    }

    .operations-focus-copy {
      font-size: 0.83rem;
      color: #cbd5e1;
      line-height: 1.45;
    }

    .operations-focus-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .operations-focus-btn {
      border: 1px solid rgba(59, 130, 246, 0.35);
      background: rgba(59, 130, 246, 0.18);
      color: #eff6ff;
      border-radius: 999px;
      padding: 0.58rem 0.85rem;
      font-size: 0.76rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .operations-focus-btn.secondary {
      border-color: rgba(148, 163, 184, 0.24);
      background: rgba(30, 41, 59, 0.78);
      color: var(--text);
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      min-width: 0;
      position: relative;
    }

    .summary-card strong {
      display: block;
      font-size: 1.1rem;
      color: var(--text);
    }

    .summary-card span {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .summary-badge {
      position: absolute;
      top: 0.55rem;
      right: 0.55rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.45rem;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
    }

    .summary-badge small {
      display: inline;
      font-size: 0.64rem;
      font-weight: 700;
      color: #fca5a5;
      text-transform: none;
      letter-spacing: normal;
    }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.1rem;
    }

    .filter-chip {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.55rem 0.8rem;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-chip.active {
      background: rgba(165, 74, 123, 0.18);
      border-color: rgba(165, 74, 123, 0.65);
      color: var(--text);
    }

    .urgent-bar {
      display: grid;
      gap: 0.55rem;
      padding: 0.75rem 0.85rem;
      border: 1px solid rgba(245, 158, 11, 0.35);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.14) 0%, rgba(239, 68, 68, 0.12) 100%);
    }

    .urgent-bar[hidden] {
      display: none;
    }

    .urgent-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .urgent-bar-header strong {
      font-size: 0.8rem;
      color: #fde68a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .urgent-bar-header span {
      font-size: 0.72rem;
      color: #f8fafc;
    }

    .urgent-list {
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
    }

    .urgent-chip {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.55);
      color: var(--text);
      border-radius: 999px;
      padding: 0.5rem 0.7rem;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .urgent-chip.pending {
      color: #fde68a;
    }

    .urgent-chip.overdue {
      color: #fecaca;
    }

    .booking-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--s-pending);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      animation: slideIn 0.3s ease-out;
    }

    .booking-item.focused {
      box-shadow: 0 0 0 2px rgba(249, 215, 232, 0.35);
      transform: translateY(-1px);
    }

    .booking-item.stage-changed {
      animation: stageShiftPulse 1.4s ease-out;
    }

    @keyframes stageShiftPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(249, 215, 232, 0.5);
        transform: translateY(-2px) scale(1.01);
      }
      45% {
        box-shadow: 0 0 0 10px rgba(249, 215, 232, 0.08);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(249, 215, 232, 0);
        transform: translateY(0) scale(1);
      }
    }

    .queue-section {
      display: grid;
      gap: 0.7rem;
    }

    .queue-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0 0.2rem;
    }

    .queue-section-header strong {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .queue-section-header span {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .queue-toggle {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .queue-toggle:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .queue-section-content[hidden] {
      display: none;
    }

    .queue-subsection {
      display: grid;
      gap: 0.65rem;
    }

    .queue-subsection-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0 0.25rem;
    }

    .queue-subsection-header strong {
      font-size: 0.75rem;
      color: #f9d7e8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .queue-subsection-header span {
      font-size: 0.7rem;
      color: var(--muted);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .booking-item.confirmed {
      border-left-color: var(--s-confirmed);
    }

    .booking-item.arrived {
      border-left-color: var(--s-arrived);
    }

    .booking-item.cancelled {
      border-left-color: var(--s-cancelled);
      opacity: 0.6;
    }

    .booking-item.noshow {
      border-left-color: var(--s-noshow);
      opacity: 0.6;
    }

    .booking-item.done {
      border-left-color: var(--s-done);
      opacity: 0.6;
    }

    .booking-time {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--brand);
      min-width: 70px;
      text-align: center;
    }

    .booking-info {
      flex: 1;
      min-width: 0;
    }

    .booking-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.3rem;
      word-break: break-word;
    }

    .booking-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.3rem;
    }

    .booking-title-row .booking-name {
      margin-bottom: 0;
      flex: 1;
    }

    .hot-one-tap-btn {
      border: none;
      border-radius: 999px;
      padding: 0.45rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .hot-one-tap-btn.confirm {
      background: var(--s-confirmed);
    }

    .hot-one-tap-btn.arrived {
      background: var(--s-arrived);
    }

    .booking-next-action {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      background: rgba(165, 74, 123, 0.15);
      color: #f9d7e8;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .booking-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.45rem;
      flex-wrap: wrap;
    }

    .booking-time-drift {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      background: rgba(148, 163, 184, 0.12);
      color: var(--text);
    }

    .booking-time-drift.due_now {
      background: rgba(59, 130, 246, 0.18);
      color: #bfdbfe;
    }

    .booking-time-drift.overdue {
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
    }

    .booking-origin-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      background: rgba(16, 185, 129, 0.16);
      color: #bbf7d0;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .booking-time-drift.later {
      background: rgba(16, 185, 129, 0.14);
      color: #bbf7d0;
    }

    .booking-details {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .booking-stage {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(165, 74, 123, 0.2);
      color: var(--brand);
    }

    .booking-stage.confirmed {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .booking-stage.arrived {
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
    }

    .booking-buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }

    .btn-stage {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      color: white;
    }

    .btn-stage.primary-action {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .btn-confirm {
      background: var(--s-confirmed);
    }

    .btn-confirm:hover {
      background: #2563eb;
    }

    .btn-arrived {
      background: var(--s-arrived);
    }

    .btn-arrived:hover {
      background: #7c3aed;
    }

    .btn-noshow {
      background: var(--s-noshow);
    }

    .btn-noshow:hover {
      background: #dc2626;
    }

    .btn-done {
      background: var(--s-done);
    }

    .btn-done:hover {
      background: #059669;
    }

    .btn-cancel {
      background: var(--s-cancelled);
    }

    .btn-cancel:hover {
      background: #4b5563;
    }

    .btn-stage:active {
      transform: scale(0.95);
    }

    .btn-stage:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-stage.is-busy {
      opacity: 1;
      filter: saturate(0.9) brightness(1.05);
      cursor: progress;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }

    /* SETTINGS MODAL */
    .settings-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .settings-content {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
    }

    .settings-content h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .setting-item:last-child {
      border-bottom: none;
    }

    .setting-label {
      font-size: 0.95rem;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 28px;
      background: var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-switch.on {
      background: var(--brand);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 12px;
      transition: left 0.3s;
    }

    .toggle-switch.on::after {
      left: 24px;
    }

    .close-settings {
      width: 100%;
      padding: 10px;
      background: var(--border);
      border: none;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      margin-top: 1rem;
    }

    .close-settings:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .quick-booking-modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.82);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      z-index: 1100;
    }

    .quick-booking-modal.open {
      display: flex;
    }

    .quick-booking-sheet {
      width: min(100%, 560px);
      background: #132034;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 18px 18px 0 0;
      padding: 1rem;
      display: grid;
      gap: 0.85rem;
      box-shadow: 0 -16px 40px rgba(0, 0, 0, 0.35);
    }

    .quick-booking-sheet h3 {
      margin: 0;
      font-size: 1rem;
      color: var(--text);
    }

    .quick-booking-sheet p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .quick-booking-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .quick-booking-field {
      display: grid;
      gap: 0.35rem;
    }

    .quick-booking-field.full {
      grid-column: 1 / -1;
    }

    .quick-booking-field label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .quick-booking-field input,
    .quick-booking-field select,
    .quick-booking-field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      border-radius: 10px;
      padding: 0.8rem 0.85rem;
      font-size: 0.92rem;
    }

    .quick-booking-field textarea {
      min-height: 88px;
      resize: vertical;
    }

    .quick-booking-actions {
      display: flex;
      gap: 0.65rem;
    }

    .quick-booking-actions button {
      flex: 1;
    }

    .quick-booking-error {
      min-height: 1.1rem;
      font-size: 0.8rem;
      color: #fca5a5;
    }

    /* STATUS INDICATOR */
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 6px;
      background: #ef4444;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }

    .status-indicator.connected {
      background: #10b981;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* TOAST NOTIFICATIONS */
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--bg-card);
      border-left: 4px solid var(--brand);
      padding: 1rem;
      border-radius: 6px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease-out;
      z-index: 2000;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .service-date-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .service-date-label {
        grid-column: 1 / -1;
      }

      .service-date-input {
        grid-column: 1 / -1;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .booking-item {
        padding: 0.8rem;
      }

      .booking-buttons {
        gap: 0.3rem;
      }

      .btn-stage {
        padding: 6px 10px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>ESSKULTUR</h1>
      <p>Staff App</p>
      <form class="login-form" id="loginForm">
        <div class="login-error" id="loginError"></div>
        <input
          type="tel"
          id="pinInput"
          placeholder="Enter PIN"
          inputmode="numeric"
          maxlength="4"
          required
        />
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div class="app-screen" id="appScreen">
    <div class="app-header">
      <div>
        <h2>📋 Bookings</h2>
        <small><span class="status-indicator" id="statusIndicator"></span><span id="statusText">Connecting...</span></small>
      </div>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="mobile-summary">
      <div class="quick-actions-row">
        <button type="button" class="quick-action-btn" id="quickWalkInBtn">+ Quick walk-in</button>
        <button type="button" class="quick-action-btn" id="arrivalsLaneBtn">Arrivals lane</button>
      </div>
      <div class="service-date-row">
        <button type="button" class="service-date-btn has-count" id="serviceDatePrev" aria-label="Previous service date"><span>←</span><span class="service-date-count" id="serviceDatePrevCount">0</span></button>
        <div class="service-date-label" id="serviceDateLabel">
          <strong>Today</strong>
          <span>Service date</span>
        </div>
        <input type="date" class="service-date-input" id="serviceDateInput" aria-label="Select service date" />
        <button type="button" class="service-date-btn active" id="serviceDateToday">Today</button>
        <button type="button" class="service-date-btn has-count" id="serviceDateNext" aria-label="Next service date"><span>→</span><span class="service-date-count" id="serviceDateNextCount">0</span></button>
      </div>
      <div class="service-shortcuts-row">
        <button type="button" class="service-shortcut-btn" id="serviceDateShortcutTomorrow">Tomorrow</button>
        <button type="button" class="service-shortcut-btn" id="serviceDateShortcutWeekend">Weekend</button>
      </div>
      <div class="operations-focus" id="operationsFocus"></div>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="filter-row" id="filterRow"></div>
      <div class="urgent-bar" id="urgentBar" hidden>
        <div class="urgent-bar-header">
          <strong>Urgent now</strong>
          <span id="urgentBarCount">0 items</span>
        </div>
        <div class="urgent-list" id="urgentList"></div>
      </div>
    </div>

    <div class="app-feed" id="appFeed">
      <div class="empty-state">No bookings yet</div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <h3>Settings</h3>
      <div class="setting-item">
        <label class="setting-label">Sound Notifications</label>
        <div class="toggle-switch" id="soundToggle" role="switch" aria-checked="true"></div>
      </div>
      <button class="close-settings" id="closeSettings">Close</button>
    </div>
  </div>

  <div class="quick-booking-modal" id="quickBookingModal">
    <div class="quick-booking-sheet">
      <div>
        <h3>Quick Walk-In</h3>
        <p>Create an onsite booking without leaving the mobile queue.</p>
      </div>
      <form id="quickBookingForm" class="quick-booking-grid">
        <div class="quick-booking-field full">
          <label for="quickBookingName">Guest name</label>
          <input type="text" id="quickBookingName" required />
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingPhone">Phone</label>
          <input type="tel" id="quickBookingPhone" required />
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingEmail">Email</label>
          <input type="email" id="quickBookingEmail" />
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingPax">Pax</label>
          <input type="number" id="quickBookingPax" min="1" max="24" value="2" required />
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingDate">Date</label>
          <input type="date" id="quickBookingDate" required />
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingTime">Time</label>
          <input type="time" id="quickBookingTime" required />
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingArea">Area</label>
          <select id="quickBookingArea">
            <option value="indoor">Indoor</option>
            <option value="outdoor">Outdoor</option>
            <option value="garden">Garden</option>
            <option value="bar">Bar</option>
          </select>
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingFlag">Flag</label>
          <select id="quickBookingFlag">
            <option value="">None</option>
            <option value="vip">VIP</option>
            <option value="founder">Founder</option>
            <option value="kc">KC</option>
          </select>
        </div>
        <div class="quick-booking-field">
          <label for="quickBookingDuration">Duration</label>
          <input type="number" id="quickBookingDuration" min="30" step="15" value="120" />
        </div>
        <div class="quick-booking-field full">
          <label for="quickBookingNotes">Notes</label>
          <textarea id="quickBookingNotes"></textarea>
        </div>
        <div class="quick-booking-error full" id="quickBookingError"></div>
        <div class="quick-booking-actions full">
          <button type="button" class="close-settings" id="quickBookingCancel">Cancel</button>
          <button type="submit" class="login-btn" id="quickBookingSubmit">Create booking</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    /*__STAFF_APP_BOOKING_HELPERS__*/
    (function() {
      const bookingHelpers = window.StaffAppBookingHelpers || {};
      const COLLAPSED_SECTION_STORAGE_KEY = 'staffAppCollapsedSections';
      const QUICK_BOOKING_PREFS_STORAGE_KEY = 'staffAppQuickBookingPrefs';
      const TIMING_REFRESH_INTERVAL_MS = 30000;
      const stageTransitionTimers = {};
      const quickBookingBadgeTimers = {};
      let timingRefreshIntervalId = null;

      function getDefaultCollapsedSections() {
        return {
          noshow: true,
          cancelled: true,
          done: true
        };
      }

      function loadCollapsedSectionsPreference() {
        try {
          const parsed = JSON.parse(localStorage.getItem(COLLAPSED_SECTION_STORAGE_KEY) || 'null');
          if (!parsed || typeof parsed !== 'object') return getDefaultCollapsedSections();
          return {
            ...getDefaultCollapsedSections(),
            ...parsed
          };
        } catch {
          return getDefaultCollapsedSections();
        }
      }

      function persistCollapsedSectionsPreference(collapsedSections) {
        try {
          localStorage.setItem(COLLAPSED_SECTION_STORAGE_KEY, JSON.stringify(collapsedSections || getDefaultCollapsedSections()));
        } catch {
          // Ignore storage failures and keep runtime state only.
        }
      }

      function loadQuickBookingPreferences() {
        try {
          const parsed = JSON.parse(localStorage.getItem(QUICK_BOOKING_PREFS_STORAGE_KEY) || 'null');
          if (!parsed || typeof parsed !== 'object') return {};
          return parsed;
        } catch {
          return {};
        }
      }

      function persistQuickBookingPreferences(preferences) {
        try {
          localStorage.setItem(QUICK_BOOKING_PREFS_STORAGE_KEY, JSON.stringify(preferences || {}));
        } catch {
          // Ignore storage failures and keep runtime behavior only.
        }
      }

      // State
      let state = {
        companyId: null,
        staffId: null,
        staffName: null,
        requestedCompanyId: null,
        soundEnabled: localStorage.getItem('soundEnabled') !== 'false',
        staffPin: null,
        serviceDate: null,
        adjacentDateBookings: {},
        adjacentDateCounts: {},
        activeFilter: 'active',
        collapsedSections: loadCollapsedSectionsPreference(),
        pendingStageUpdates: {},
        recentStageTransitions: {},
        recentQuickBookings: {},
        bookings: [],
        eventSource: null,
        bookingUpdate: null
      };

      const STAGE_COLORS = {
        pending: '#f59e0b',
        confirmed: '#3b82f6',
        arrived: '#8b5cf6',
        noshow: '#ef4444',
        done: '#10b981',
        cancelled: '#6b7280'
      };

      const STAGE_LABELS = {
        pending: 'Pending',
        confirmed: 'Confirmed',
        arrived: 'Arrived',
        noshow: 'No-Show',
        done: 'Done',
        cancelled: 'Cancelled'
      };

      // DOM Elements
      const loginScreen = document.getElementById('loginScreen');
      const appScreen = document.getElementById('appScreen');
      const loginForm = document.getElementById('loginForm');
      const pinInput = document.getElementById('pinInput');
      const loginError = document.getElementById('loginError');
      const appFeed = document.getElementById('appFeed');
      const operationsFocus = document.getElementById('operationsFocus');
      const summaryGrid = document.getElementById('summaryGrid');
      const filterRow = document.getElementById('filterRow');
      const urgentBar = document.getElementById('urgentBar');
      const urgentBarCount = document.getElementById('urgentBarCount');
      const urgentList = document.getElementById('urgentList');
      const settingsBtn = document.getElementById('settingsBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const settingsModal = document.getElementById('settingsModal');
      const soundToggle = document.getElementById('soundToggle');
      const closeSettings = document.getElementById('closeSettings');
      const statusIndicator = document.getElementById('statusIndicator');
      const statusText = document.getElementById('statusText');
      const quickWalkInBtn = document.getElementById('quickWalkInBtn');
      const arrivalsLaneBtn = document.getElementById('arrivalsLaneBtn');
      const quickBookingModal = document.getElementById('quickBookingModal');
      const quickBookingForm = document.getElementById('quickBookingForm');
      const quickBookingCancel = document.getElementById('quickBookingCancel');
      const quickBookingError = document.getElementById('quickBookingError');
      const quickBookingSubmit = document.getElementById('quickBookingSubmit');
      const quickBookingName = document.getElementById('quickBookingName');
      const quickBookingPhone = document.getElementById('quickBookingPhone');
      const quickBookingEmail = document.getElementById('quickBookingEmail');
      const quickBookingPax = document.getElementById('quickBookingPax');
      const quickBookingDate = document.getElementById('quickBookingDate');
      const quickBookingTime = document.getElementById('quickBookingTime');
      const quickBookingArea = document.getElementById('quickBookingArea');
      const quickBookingFlag = document.getElementById('quickBookingFlag');
      const quickBookingDuration = document.getElementById('quickBookingDuration');
      const quickBookingNotes = document.getElementById('quickBookingNotes');
      const serviceDatePrev = document.getElementById('serviceDatePrev');
      const serviceDatePrevCount = document.getElementById('serviceDatePrevCount');
      const serviceDateToday = document.getElementById('serviceDateToday');
      const serviceDateNext = document.getElementById('serviceDateNext');
      const serviceDateNextCount = document.getElementById('serviceDateNextCount');
      const serviceDateLabel = document.getElementById('serviceDateLabel');
      const serviceDateInput = document.getElementById('serviceDateInput');
      const serviceDateShortcutTomorrow = document.getElementById('serviceDateShortcutTomorrow');
      const serviceDateShortcutWeekend = document.getElementById('serviceDateShortcutWeekend');

      // Initialize
      function init() {
        state.requestedCompanyId = getRequestedCompanyIdFromLocation();
        state.serviceDate = getTodayDateValue();
        loginForm.addEventListener('submit', handleLogin);
        logoutBtn.addEventListener('click', handleLogout);
        settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
        closeSettings.addEventListener('click', () => settingsModal.style.display = 'none');
        soundToggle.addEventListener('click', toggleSound);
        quickWalkInBtn.addEventListener('click', openQuickBookingModal);
        arrivalsLaneBtn.addEventListener('click', openArrivalsLane);
        quickBookingCancel.addEventListener('click', closeQuickBookingModal);
        quickBookingForm.addEventListener('submit', submitQuickBooking);
        quickBookingDate.addEventListener('change', syncQuickBookingTimeSuggestion);
        serviceDatePrev.addEventListener('click', () => changeServiceDate(-1));
        serviceDateToday.addEventListener('click', () => setServiceDate(getTodayDateValue()));
        serviceDateNext.addEventListener('click', () => changeServiceDate(1));
        serviceDateInput.addEventListener('change', () => setServiceDate(serviceDateInput.value));
        serviceDateShortcutTomorrow.addEventListener('click', () => setServiceDate(shiftDateValue(getTodayDateValue(), 1)));
        serviceDateShortcutWeekend.addEventListener('click', () => setServiceDate(getNextWeekendDateValue(state.serviceDate || getTodayDateValue())));
        settingsModal.addEventListener('click', (e) => {
          if (e.target === settingsModal) settingsModal.style.display = 'none';
        });
        quickBookingModal.addEventListener('click', (e) => {
          if (e.target === quickBookingModal) closeQuickBookingModal();
        });

        // Update sound toggle UI
        updateSoundToggleUI();
        renderServiceDateControls();
        renderMobileSummary();
      }

      function getTodayDateValue() {
        const now = new Date();
        const year = String(now.getFullYear());
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function getDefaultTimeValue() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(Math.ceil(now.getMinutes() / 15) * 15 % 60).padStart(2, '0');
        const adjustedHours = minutes === '00' && now.getMinutes() > 45
          ? String((now.getHours() + 1) % 24).padStart(2, '0')
          : hours;
        return `${adjustedHours}:${minutes}`;
      }

      function shiftDateValue(dateValue, offsetDays) {
        const source = String(dateValue || '').trim() || getTodayDateValue();
        const date = new Date(`${source}T00:00:00`);
        if (Number.isNaN(date.getTime())) return getTodayDateValue();
        date.setDate(date.getDate() + Number(offsetDays || 0));
        const year = String(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function getNextWeekendDateValue(dateValue) {
        const source = String(dateValue || '').trim() || getTodayDateValue();
        const date = new Date(`${source}T00:00:00`);
        if (Number.isNaN(date.getTime())) return getTodayDateValue();

        const dayOfWeek = date.getDay();
        const daysUntilSaturday = (6 - dayOfWeek + 7) % 7;
        date.setDate(date.getDate() + daysUntilSaturday);
        const year = String(date.getFullYear());
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function formatServiceDateLabel(dateValue) {
        const normalized = String(dateValue || '').trim() || getTodayDateValue();
        const today = getTodayDateValue();
        const tomorrow = shiftDateValue(today, 1);
        const yesterday = shiftDateValue(today, -1);

        if (normalized === today) return 'Today';
        if (normalized === tomorrow) return 'Tomorrow';
        if (normalized === yesterday) return 'Yesterday';

        const parsed = new Date(`${normalized}T00:00:00`);
        if (Number.isNaN(parsed.getTime())) return normalized;
        return parsed.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' });
      }

      function renderServiceDateControls() {
        if (!serviceDateLabel || !serviceDateToday || !serviceDateInput || !serviceDatePrevCount || !serviceDateNextCount) return;
        const activeDate = state.serviceDate || getTodayDateValue();
        const todayDate = getTodayDateValue();
        const prevDate = shiftDateValue(activeDate, -1);
        const nextDate = shiftDateValue(activeDate, 1);
        const tomorrowDate = shiftDateValue(todayDate, 1);
        const weekendDate = getNextWeekendDateValue(activeDate);
        const tomorrowLabel = weekendDate === tomorrowDate ? 'Tomorrow (Weekend)' : 'Tomorrow';
        const weekendLabel = weekendDate === todayDate
          ? 'Weekend (Today)'
          : weekendDate === tomorrowDate
            ? 'Weekend (Tomorrow)'
            : `Weekend ${formatServiceDateLabel(weekendDate)}`;
        const labelStrong = serviceDateLabel.querySelector('strong');
        const labelMeta = serviceDateLabel.querySelector('span');
        if (labelStrong) labelStrong.textContent = formatServiceDateLabel(activeDate);
        if (labelMeta) labelMeta.textContent = activeDate;
        serviceDateInput.value = activeDate;
        serviceDateToday.classList.toggle('active', activeDate === todayDate);
        serviceDateShortcutTomorrow.classList.toggle('active', activeDate === tomorrowDate);
        serviceDateShortcutWeekend.classList.toggle('active', activeDate === weekendDate);
        serviceDateShortcutTomorrow.textContent = tomorrowLabel;
        serviceDateShortcutTomorrow.title = `${formatServiceDateLabel(tomorrowDate)} shortcut`;
        serviceDateShortcutWeekend.textContent = weekendLabel;
        serviceDateShortcutWeekend.title = `${formatServiceDateLabel(weekendDate)} weekend shortcut`;
        serviceDatePrev.title = `${formatServiceDateLabel(prevDate)} · ${Number(state.adjacentDateCounts?.[prevDate] || 0)} bookings`;
        serviceDateNext.title = `${formatServiceDateLabel(nextDate)} · ${Number(state.adjacentDateCounts?.[nextDate] || 0)} bookings`;
        serviceDatePrevCount.textContent = String(Number(state.adjacentDateCounts?.[prevDate] || 0));
        serviceDateNextCount.textContent = String(Number(state.adjacentDateCounts?.[nextDate] || 0));
      }

      async function fetchBookingsForDate(targetDate) {
        if (!state.companyId) return 0;

        const params = new URLSearchParams({
          company_id: String(state.companyId),
          pin: String(state.staffPin || ''),
          date: String(targetDate || '')
        });
        const response = await fetch(`/api/bookings?${params.toString()}`);
        const body = await response.json().catch(() => ({}));
        if (!response.ok || !body.ok) {
          throw new Error(body.error || `Unable to load bookings for ${targetDate}`);
        }

        return typeof bookingHelpers.filterBookingsForServiceDate === 'function'
          ? bookingHelpers.filterBookingsForServiceDate(body.data, targetDate)
          : (Array.isArray(body.data) ? body.data : []);
      }

      async function setServiceDate(nextDate) {
        const normalized = isValidDateInputValue(nextDate) ? String(nextDate) : getTodayDateValue();
        if (normalized === state.serviceDate) return;
        state.serviceDate = normalized;
        state.activeFilter = 'active';
        renderServiceDateControls();
        if (state.companyId) {
          await loadInitialBookings();
        } else {
          refreshUi();
        }
      }

      async function changeServiceDate(offsetDays) {
        await setServiceDate(shiftDateValue(state.serviceDate || getTodayDateValue(), offsetDays));
      }

      function isValidDateInputValue(value) {
        return /^\d{4}-\d{2}-\d{2}$/.test(String(value || '').trim());
      }

      function isValidTimeInputValue(value) {
        return /^\d{2}:\d{2}$/.test(String(value || '').trim());
      }

      function getSuggestedTimeForDate(dateValue, preferredTime) {
        const normalizedDate = String(dateValue || '').trim();
        const normalizedPreferredTime = String(preferredTime || '').trim();
        const today = getTodayDateValue();

        if (normalizedDate === today) {
          return isValidTimeInputValue(normalizedPreferredTime) ? normalizedPreferredTime : getDefaultTimeValue();
        }

        if (isValidTimeInputValue(normalizedPreferredTime)) return normalizedPreferredTime;
        return '19:00';
      }

      function getRecentQuickBookingDefaults() {
        const preferences = loadQuickBookingPreferences();
        const recentAreaBooking = state.bookings.find((booking) => ['pending', 'confirmed', 'arrived'].includes(String(booking.stage || '')) && booking.area);
        const preferredArea = ['indoor', 'outdoor', 'garden', 'bar'].includes(String(preferences.area || ''))
          ? String(preferences.area)
          : String(recentAreaBooking?.area || 'indoor');
        const preferredPax = Number(preferences.pax || 2);
        const preferredDuration = Number(preferences.duration || 120);
        const preferredFlag = ['vip', 'founder', 'kc'].includes(String(preferences.flag || ''))
          ? String(preferences.flag)
          : '';
        const preferredDate = isValidDateInputValue(state.serviceDate)
          ? String(state.serviceDate)
          : isValidDateInputValue(preferences.date) && String(preferences.date) >= getTodayDateValue()
            ? String(preferences.date)
            : getTodayDateValue();
        const preferredTime = getSuggestedTimeForDate(preferredDate, preferences.time);

        return {
          date: preferredDate,
          time: preferredTime,
          area: preferredArea,
          pax: Number.isFinite(preferredPax) && preferredPax > 0 ? String(preferredPax) : '2',
          duration: Number.isFinite(preferredDuration) && preferredDuration >= 30 ? String(preferredDuration) : '120',
          flag: preferredFlag
        };
      }

      function syncQuickBookingTimeSuggestion() {
        const selectedDate = quickBookingDate.value || getTodayDateValue();
        const currentTime = quickBookingTime.value;
        const today = getTodayDateValue();

        if (!isValidTimeInputValue(currentTime)) {
          quickBookingTime.value = getSuggestedTimeForDate(selectedDate, '');
          return;
        }

        if (selectedDate !== today && currentTime === getDefaultTimeValue()) {
          quickBookingTime.value = '19:00';
        }
      }

      function resetQuickBookingForm() {
        quickBookingForm.reset();
        const defaults = getRecentQuickBookingDefaults();
        quickBookingDate.value = defaults.date;
        quickBookingTime.value = defaults.time;
        quickBookingPax.value = defaults.pax;
        quickBookingDuration.value = defaults.duration;
        quickBookingArea.value = defaults.area;
        quickBookingFlag.value = defaults.flag;
        quickBookingError.textContent = '';
        quickBookingSubmit.disabled = false;
      }

      function openQuickBookingModal() {
        resetQuickBookingForm();
        quickBookingModal.classList.add('open');
        quickBookingName.focus();
      }

      function closeQuickBookingModal() {
        quickBookingModal.classList.remove('open');
        quickBookingError.textContent = '';
        quickBookingSubmit.disabled = false;
      }

      async function submitQuickBooking(event) {
        event.preventDefault();
        quickBookingError.textContent = '';

        if (!state.companyId || !state.staffPin) {
          quickBookingError.textContent = 'Staff session expired. Log in again.';
          return;
        }

        quickBookingSubmit.disabled = true;
        try {
          const response = await fetch(`/api/bookings/staff-create?company_id=${encodeURIComponent(state.companyId)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              pin: state.staffPin,
              name: quickBookingName.value.trim(),
              phone: quickBookingPhone.value.trim(),
              email: quickBookingEmail.value.trim(),
              date: quickBookingDate.value,
              time: quickBookingTime.value,
              pax: Number(quickBookingPax.value || 0),
              area: quickBookingArea.value,
              flag: quickBookingFlag.value,
              duration: Number(quickBookingDuration.value || 120),
              notes: quickBookingNotes.value.trim()
            })
          });

          const body = await response.json().catch(() => ({}));
          if (!response.ok || !body.ok) {
            quickBookingError.textContent = body.error || 'Unable to create booking';
            quickBookingSubmit.disabled = false;
            return;
          }

          const createdBooking = body.booking || null;
          persistQuickBookingPreferences({
            date: quickBookingDate.value,
            time: quickBookingTime.value,
            area: quickBookingArea.value,
            pax: Number(quickBookingPax.value || 0),
            duration: Number(quickBookingDuration.value || 120),
            flag: quickBookingFlag.value || ''
          });
          closeQuickBookingModal();
          state.activeFilter = 'pending';
          if (createdBooking && createdBooking.id) {
            markQuickBookingBadge(createdBooking.id);
            syncAdjacentServiceDateState(createdBooking);
            addOrUpdateBooking(createdBooking);
            focusBookingCard(createdBooking.id);
          } else {
            await loadInitialBookings();
          }
          showToast('Walk-in booking created');
        } catch {
          quickBookingError.textContent = 'Network error';
          quickBookingSubmit.disabled = false;
        }
      }

      function getArrivalsLaneCounts() {
        return typeof bookingHelpers.summarizeArrivalsLane === 'function'
          ? bookingHelpers.summarizeArrivalsLane(state.bookings, new Date())
          : { total: 0, dueNow: 0, overdue: 0, later: 0 };
      }

      function openArrivalsLane() {
        setActiveLane('arrivals');
      }

      function getOperationsFocusState(summary, arrivalsLaneCounts) {
        if (summary.pending > 0) {
          return {
            lane: 'pending',
            state: `${summary.pending} pending`,
            title: 'Confirm waiting bookings first',
            copy: 'Start with pending bookings so unanswered guests do not block the service flow.',
            primaryLabel: `Open pending ${summary.pending}`,
            secondaryLane: arrivalsLaneCounts.total > 0 ? 'arrivals' : 'active',
            secondaryLabel: arrivalsLaneCounts.total > 0 ? `Then check arrivals ${arrivalsLaneCounts.total}` : 'View active queue'
          };
        }

        if (arrivalsLaneCounts.overdue > 0 || arrivalsLaneCounts.dueNow > 0) {
          return {
            lane: 'arrivals',
            state: `${arrivalsLaneCounts.dueNow} due now • ${arrivalsLaneCounts.overdue} overdue`,
            title: 'Check in arriving guests now',
            copy: 'Use the arrivals lane to clear overdue check-ins first, then guests who should be arriving now.',
            primaryLabel: `Open arrivals ${arrivalsLaneCounts.total}`,
            secondaryLane: summary.arrived > 0 ? 'arrived' : 'confirmed',
            secondaryLabel: summary.arrived > 0 ? `On site now ${summary.arrived}` : `Confirmed ${summary.confirmed}`
          };
        }

        if (summary.arrived > 0) {
          return {
            lane: 'arrived',
            state: `${summary.arrived} on site`,
            title: 'Close active tables after service',
            copy: 'Guests are already on site. Keep the arrived lane current so tables can be closed cleanly.',
            primaryLabel: `Open arrived ${summary.arrived}`,
            secondaryLane: summary.confirmed > 0 ? 'confirmed' : 'all',
            secondaryLabel: summary.confirmed > 0 ? `Monitor confirmed ${summary.confirmed}` : 'See full queue'
          };
        }

        if (summary.confirmed > 0) {
          return {
            lane: 'confirmed',
            state: `${summary.confirmed} confirmed`,
            title: 'Monitor upcoming arrivals',
            copy: 'Nothing urgent is blocking right now. Stay ready for arrivals and keep the queue visible.',
            primaryLabel: `Open confirmed ${summary.confirmed}`,
            secondaryLane: 'all',
            secondaryLabel: 'See full queue'
          };
        }

        return {
          lane: 'active',
          state: 'Queue under control',
          title: 'No urgent action right now',
          copy: 'Use quick walk-in for new onsite guests or switch service date to prepare the next session.',
          primaryLabel: 'Open active queue',
          secondaryLane: null,
          secondaryLabel: null
        };
      }

      function renderOperationsFocus(summary, arrivalsLaneCounts) {
        if (!operationsFocus) return;

        const focus = getOperationsFocusState(summary, arrivalsLaneCounts);
        operationsFocus.innerHTML = `
          <div class="operations-focus-header">
            <span class="operations-focus-label">What To Do Now</span>
            <span class="operations-focus-state">${focus.state}</span>
          </div>
          <div class="operations-focus-title">${focus.title}</div>
          <div class="operations-focus-copy">${focus.copy}</div>
          <div class="operations-focus-actions">
            <button type="button" class="operations-focus-btn" data-ops-lane="${focus.lane}">${focus.primaryLabel}</button>
            ${focus.secondaryLane ? `<button type="button" class="operations-focus-btn secondary" data-ops-lane="${focus.secondaryLane}">${focus.secondaryLabel}</button>` : ''}
          </div>
        `;

        operationsFocus.querySelectorAll('[data-ops-lane]').forEach((button) => {
          button.addEventListener('click', () => {
            setActiveLane(button.dataset.opsLane || 'active');
          });
        });
      }

      function refreshTimeSensitiveUi() {
        if (!state.companyId) return;
        renderMobileSummary();
        renderFeed();
      }

      function startTimingRefreshLoop() {
        stopTimingRefreshLoop();
        timingRefreshIntervalId = window.setInterval(() => {
          refreshTimeSensitiveUi();
        }, TIMING_REFRESH_INTERVAL_MS);
      }

      function stopTimingRefreshLoop() {
        if (timingRefreshIntervalId) {
          window.clearInterval(timingRefreshIntervalId);
          timingRefreshIntervalId = null;
        }
      }

      function getBookingStageSummary() {
        const all = Array.isArray(state.bookings) ? state.bookings : [];
        return {
          all: all.length,
          pending: all.filter((booking) => booking.stage === 'pending').length,
          confirmed: all.filter((booking) => booking.stage === 'confirmed').length,
          arrived: all.filter((booking) => booking.stage === 'arrived').length,
          completed: all.filter((booking) => ['done', 'cancelled', 'noshow'].includes(booking.stage)).length
        };
      }

      function getVisibleBookings() {
        const all = Array.isArray(state.bookings) ? state.bookings.slice() : [];
        const stagePriority = {
          pending: 0,
          confirmed: 1,
          arrived: 2,
          noshow: 3,
          cancelled: 4,
          done: 5
        };

        all.sort((left, right) => {
          const stageDelta = (stagePriority[left.stage] ?? 99) - (stagePriority[right.stage] ?? 99);
          if (stageDelta !== 0) return stageDelta;
          return String(left.booking_time || '').localeCompare(String(right.booking_time || ''));
        });

        if (state.activeFilter === 'active') {
          return all.filter((booking) => ['pending', 'confirmed', 'arrived'].includes(booking.stage));
        }

        if (state.activeFilter === 'hot') {
          return all.filter((booking) => {
            if (booking.stage === 'pending') return true;
            return booking.stage === 'confirmed' && getConfirmedTimingBucket(booking) === 'overdue';
          });
        }

        if (state.activeFilter === 'arrivals') {
          return all.filter((booking) => booking.stage === 'confirmed');
        }

        if (state.activeFilter === 'completed') {
          return all.filter((booking) => ['done', 'cancelled', 'noshow'].includes(booking.stage));
        }

        if (state.activeFilter === 'all') {
          return all;
        }

        return all.filter((booking) => booking.stage === state.activeFilter);
      }

      function getEmptyStateMessage() {
        if (!state.bookings.length) return 'No bookings yet';
        if (state.activeFilter === 'active') return 'No active bookings right now';
        if (state.activeFilter === 'hot') return 'No urgent bookings right now';
        if (state.activeFilter === 'arrivals') return 'No arrivals need check-in right now';
        if (state.activeFilter === 'completed') return 'No completed bookings yet';
        if (state.activeFilter === 'all') return 'No bookings yet';
        return `No ${state.activeFilter} bookings right now`;
      }

      function refreshUi() {
        renderMobileSummary();
        renderFeed();
      }

      function setActiveLane(filterKey) {
        state.activeFilter = filterKey || 'active';
        refreshUi();
        if (appFeed && typeof appFeed.scrollTo === 'function') {
          appFeed.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }

      function normalizeBookingId(bookingId) {
        return String(bookingId || '').trim();
      }

      function findBookingById(bookingId) {
        const normalizedBookingId = normalizeBookingId(bookingId);
        if (!normalizedBookingId) return null;
        return state.bookings.find((item) => normalizeBookingId(item.id) === normalizedBookingId) || null;
      }

      function renderMobileSummary() {
        if (!summaryGrid || !filterRow || !urgentBar || !urgentBarCount || !urgentList || !arrivalsLaneBtn || !operationsFocus) return;

        const summary = getBookingStageSummary();
        const arrivalsLaneCounts = getArrivalsLaneCounts();
        const overdueConfirmed = state.bookings.filter((booking) => booking.stage === 'confirmed' && getConfirmedTimingBucket(booking) === 'overdue').length;
        const urgentQueueCount = summary.pending + overdueConfirmed;
        const hotBreakdown = `${summary.pending} pending • ${overdueConfirmed} overdue`;
        const serviceDateLabelText = formatServiceDateLabel(state.serviceDate || getTodayDateValue());
        const arrivalsBreakdown = typeof bookingHelpers.formatArrivalsLaneLabel === 'function'
          ? bookingHelpers.formatArrivalsLaneLabel(arrivalsLaneCounts)
          : 'No confirmed arrivals';

        arrivalsLaneBtn.textContent = arrivalsLaneCounts.total > 0
          ? `Arrivals ${arrivalsLaneCounts.total}`
          : 'Arrivals lane';
        arrivalsLaneBtn.title = arrivalsBreakdown;
        arrivalsLaneBtn.classList.toggle('active', state.activeFilter === 'arrivals');
        renderOperationsFocus(summary, arrivalsLaneCounts);
        summaryGrid.innerHTML = [
          { key: 'all', label: serviceDateLabelText, value: summary.all, badge: urgentQueueCount > 0 ? `Hot ${urgentQueueCount}` : '', badgeDetail: urgentQueueCount > 0 ? hotBreakdown : '' },
          { key: 'pending', label: 'Pending', value: summary.pending },
          { key: 'confirmed', label: 'Confirmed', value: summary.confirmed },
          { key: 'arrived', label: 'Arrived', value: summary.arrived }
        ].map((item) => `
          <div class="summary-card">
            ${item.badge ? `<button type="button" class="summary-badge" data-summary-filter="hot">${item.badge}${item.badgeDetail ? ` <small>${item.badgeDetail}</small>` : ''}</button>` : ''}
            <strong>${item.value}</strong>
            <span>${item.label}</span>
          </div>
        `).join('');

        const filters = [
          ...(urgentQueueCount > 0 ? [{ key: 'hot', label: `Hot ${urgentQueueCount} • ${hotBreakdown}` }] : []),
          { key: 'active', label: `Active ${summary.pending + summary.confirmed + summary.arrived}` },
          ...(arrivalsLaneCounts.total > 0 ? [{ key: 'arrivals', label: `Arrivals ${arrivalsLaneCounts.total} • ${arrivalsBreakdown}` }] : []),
          { key: 'pending', label: `Pending ${summary.pending}` },
          { key: 'confirmed', label: `Confirmed ${summary.confirmed}` },
          { key: 'arrived', label: `Arrived ${summary.arrived}` },
          { key: 'completed', label: `Completed ${summary.completed}` },
          { key: 'all', label: `All ${summary.all}` }
        ];

        filterRow.innerHTML = filters.map((filter) => `
          <button
            type="button"
            class="filter-chip ${state.activeFilter === filter.key ? 'active' : ''}"
            data-filter="${filter.key}"
          >${filter.label}</button>
        `).join('');

        filterRow.querySelectorAll('.filter-chip').forEach((button) => {
          button.addEventListener('click', () => {
            state.activeFilter = button.dataset.filter || 'active';
            refreshUi();
          });
        });

        summaryGrid.querySelectorAll('[data-summary-filter]').forEach((button) => {
          button.addEventListener('click', () => {
            state.activeFilter = button.dataset.summaryFilter || 'hot';
            refreshUi();
          });
        });

        const urgentItems = state.bookings.filter((booking) => {
          if (booking.stage === 'pending') return true;
          return booking.stage === 'confirmed' && getConfirmedTimingBucket(booking) === 'overdue';
        });

        if (!urgentItems.length) {
          urgentBar.hidden = true;
          urgentBarCount.textContent = '0 items';
          urgentList.innerHTML = '';
          return;
        }

        urgentBar.hidden = false;
        urgentBarCount.textContent = `${urgentItems.length} urgent item${urgentItems.length === 1 ? '' : 's'}`;
        urgentList.innerHTML = urgentItems
          .sort((left, right) => String(left.booking_time || '').localeCompare(String(right.booking_time || '')))
          .map((booking) => {
            const urgentClass = booking.stage === 'pending' ? 'pending' : 'overdue';
            const urgentLabel = booking.stage === 'pending' ? 'Pending' : 'Overdue';
            return `
              <button
                type="button"
                class="urgent-chip ${urgentClass}"
                data-urgent-filter="${booking.stage === 'pending' ? 'pending' : 'confirmed'}"
                data-booking-id="${booking.id}"
              >${urgentLabel}: ${booking.booking_time} · ${booking.contact_name}</button>
            `;
          })
          .join('');

        urgentList.querySelectorAll('.urgent-chip').forEach((button) => {
          button.addEventListener('click', () => {
            state.activeFilter = button.dataset.urgentFilter || 'active';
            refreshUi();
            focusBookingCard(button.dataset.bookingId || '');
          });
        });
      }

      function focusBookingCard(bookingId) {
        const normalizedBookingId = normalizeBookingId(bookingId);
        if (!normalizedBookingId) return;

        const target = document.querySelector(`[data-booking-card-id="${normalizedBookingId}"]`);
        if (!target) return;

        document.querySelectorAll('.booking-item.focused').forEach((element) => {
          element.classList.remove('focused');
        });

        target.classList.add('focused');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });

        window.setTimeout(() => {
          target.classList.remove('focused');
        }, 1800);
      }

      function clearStageTransitionHighlight(bookingId) {
        const normalizedBookingId = normalizeBookingId(bookingId);
        if (!normalizedBookingId) return;

        if (stageTransitionTimers[normalizedBookingId]) {
          window.clearTimeout(stageTransitionTimers[normalizedBookingId]);
          delete stageTransitionTimers[normalizedBookingId];
        }

        if (state.recentStageTransitions[normalizedBookingId]) {
          delete state.recentStageTransitions[normalizedBookingId];
        }
      }

      function markStageTransitionHighlight(bookingId, nextStage) {
        const normalizedBookingId = normalizeBookingId(bookingId);
        if (!normalizedBookingId) return;

        clearStageTransitionHighlight(normalizedBookingId);
        state.recentStageTransitions[normalizedBookingId] = nextStage;

        stageTransitionTimers[normalizedBookingId] = window.setTimeout(() => {
          clearStageTransitionHighlight(normalizedBookingId);
          renderFeed();
        }, 1600);
      }

      function clearAllStageTransitionHighlights() {
        Object.keys(stageTransitionTimers).forEach((bookingId) => {
          clearStageTransitionHighlight(bookingId);
        });
      }

      function clearQuickBookingBadge(bookingId) {
        const normalizedBookingId = normalizeBookingId(bookingId);
        if (!normalizedBookingId) return;

        if (quickBookingBadgeTimers[normalizedBookingId]) {
          window.clearTimeout(quickBookingBadgeTimers[normalizedBookingId]);
          delete quickBookingBadgeTimers[normalizedBookingId];
        }

        if (state.recentQuickBookings[normalizedBookingId]) {
          delete state.recentQuickBookings[normalizedBookingId];
        }
      }

      function markQuickBookingBadge(bookingId) {
        const normalizedBookingId = normalizeBookingId(bookingId);
        if (!normalizedBookingId) return;

        clearQuickBookingBadge(normalizedBookingId);
        state.recentQuickBookings[normalizedBookingId] = true;
        quickBookingBadgeTimers[normalizedBookingId] = window.setTimeout(() => {
          clearQuickBookingBadge(normalizedBookingId);
          renderFeed();
        }, 4000);
      }

      function clearAllQuickBookingBadges() {
        Object.keys(quickBookingBadgeTimers).forEach((bookingId) => {
          clearQuickBookingBadge(bookingId);
        });
      }

      function getRequestedCompanyIdFromLocation() {
        try {
          const raw = String(new URLSearchParams(window.location.search || '').get('company_id') || '').trim();
          const value = Number(raw || 0);
          return Number.isInteger(value) && value > 0 ? value : null;
        } catch {
          return null;
        }
      }

      function requiresCompanyIdQueryOnHost() {
        const host = String(window.location.hostname || '').toLowerCase();
        return host === 'localhost' || host === '127.0.0.1' || host === '[::1]' || host.includes('workers.dev');
      }

      // Login
      async function handleLogin(e) {
        e.preventDefault();
        const pin = pinInput.value.trim();

        if (!pin) {
          showLoginError('Please enter PIN');
          return;
        }

        if (!state.requestedCompanyId && requiresCompanyIdQueryOnHost()) {
          showLoginError('Open this page with ?company_id=1 (or your tenant ID).');
          return;
        }

        loginError.style.display = 'none';

        try {
          const params = new URLSearchParams({ pin: pin.trim() });
          if (state.requestedCompanyId) {
            params.set('company_id', String(state.requestedCompanyId));
          }

          const res = await fetch(`/api/staff/auth?${params.toString()}`);
          const data = await res.json();

          if (data.success) {
            state.companyId = Number(data.companyId || state.requestedCompanyId || 0) || null;
            state.staffId = data.staffId;
            state.staffName = data.staffName;
            state.staffPin = pin;
            showApp();
            await loadInitialBookings();
            startSSEStream();
          } else {
            const err = String(data.error || '').toLowerCase();
            if (err === 'tenant_required') {
              showLoginError('Missing tenant context. Open with ?company_id=1 (or your tenant ID).');
            } else if (err === 'company_id_override_not_allowed') {
              showLoginError('company_id override is not allowed on this host. Use your tenant subdomain.');
            } else {
              showLoginError('Invalid PIN');
            }
            pinInput.value = '';
            pinInput.focus();
          }
        } catch (err) {
          console.error('Login error:', err);
          showLoginError('Network error. Try again.');
        }
      }

      function showLoginError(msg) {
        loginError.textContent = msg;
        loginError.style.display = 'block';
      }

      function handleLogout() {
        stopTimingRefreshLoop();
        clearAllStageTransitionHighlights();
        clearAllQuickBookingBadges();

        if (state.eventSource) {
          state.eventSource.close();
          state.eventSource = null;
        }
        state = {
          companyId: null,
          staffId: null,
          staffName: null,
          requestedCompanyId: getRequestedCompanyIdFromLocation(),
          soundEnabled: state.soundEnabled,
          staffPin: null,
          serviceDate: getTodayDateValue(),
          adjacentDateBookings: {},
          adjacentDateCounts: {},
          activeFilter: 'active',
          collapsedSections: loadCollapsedSectionsPreference(),
          pendingStageUpdates: {},
          recentStageTransitions: {},
          recentQuickBookings: {},
          bookings: [],
          eventSource: null
        };
        appFeed.innerHTML = '<div class="empty-state">No bookings yet</div>';
        renderServiceDateControls();
        renderMobileSummary();
        loginScreen.style.display = 'flex';
        appScreen.style.display = 'none';
        pinInput.value = '';
      }

      // Show/Hide Screens
      function showApp() {
        loginScreen.style.display = 'none';
        appScreen.style.display = 'flex';
        startTimingRefreshLoop();
      }

      async function loadInitialBookings() {
        if (!state.companyId) return;

        try {
          const activeDate = String(state.serviceDate || getTodayDateValue());
          const prevDate = shiftDateValue(activeDate, -1);
          const nextDate = shiftDateValue(activeDate, 1);

          const params = new URLSearchParams({
            company_id: String(state.companyId),
            pin: String(state.staffPin || ''),
            date: activeDate
          });
          const [res, prevBookings, nextBookings] = await Promise.all([
            fetch(`/api/bookings?${params.toString()}`),
            fetchBookingsForDate(prevDate).catch(() => []),
            fetchBookingsForDate(nextDate).catch(() => [])
          ]);
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            console.warn('Unable to load initial bookings:', data.error || res.status);
            return;
          }

          state.bookings = typeof bookingHelpers.filterBookingsForServiceDate === 'function'
            ? bookingHelpers.filterBookingsForServiceDate(data.data, state.serviceDate || getTodayDateValue())
            : (Array.isArray(data.data) ? data.data : []);
          state.adjacentDateBookings = {
            [prevDate]: Array.isArray(prevBookings) ? prevBookings : [],
            [nextDate]: Array.isArray(nextBookings) ? nextBookings : []
          };
          state.adjacentDateCounts = {
            [prevDate]: Array.isArray(prevBookings) ? prevBookings.length : 0,
            [nextDate]: Array.isArray(nextBookings) ? nextBookings.length : 0
          };
          refreshUi();
        } catch (err) {
          console.warn('Initial bookings load failed:', err);
        }
      }

      // SSE Stream for Notifications
      function startSSEStream() {
        if (state.eventSource) {
          state.eventSource.close();
        }

        const params = new URLSearchParams({
          company_id: String(state.companyId),
          pin: String(state.staffPin || '')
        });
        const url = `/api/notifications/stream?${params.toString()}`;
        state.eventSource = new EventSource(url);

        state.eventSource.addEventListener('booking', (e) => {
          try {
            const booking = JSON.parse(e.data);
            addOrUpdateBooking(booking);
            syncAdjacentServiceDateState(booking);
            playNotification(booking);
          } catch (err) {
            console.error('Error parsing booking:', err);
          }
        });

        state.eventSource.addEventListener('stage-update', (e) => {
          try {
            const data = JSON.parse(e.data);
            updateBookingStage(data.bookingId, data.newStage);
          } catch (err) {
            console.error('Error parsing stage update:', err);
          }
        });

        state.eventSource.addEventListener('error', () => {
          updateConnectionStatus(false);
          setTimeout(startSSEStream, 3000);
        });

        state.eventSource.addEventListener('open', () => {
          updateConnectionStatus(true);
        });
      }

      function updateConnectionStatus(connected) {
        if (connected) {
          statusIndicator.classList.add('connected');
          statusText.textContent = 'Connected';
        } else {
          statusIndicator.classList.remove('connected');
          statusText.textContent = 'Reconnecting...';
        }
      }

      // Add or Update Booking
      function addOrUpdateBooking(booking) {
        state.bookings = typeof bookingHelpers.upsertBookingForServiceDate === 'function'
          ? bookingHelpers.upsertBookingForServiceDate(state.bookings, booking, state.serviceDate || getTodayDateValue())
          : state.bookings;
        refreshUi();
      }

      function syncAdjacentServiceDateState(booking) {
        const activeDate = String(state.serviceDate || getTodayDateValue());
        const prevDate = shiftDateValue(activeDate, -1);
        const nextDate = shiftDateValue(activeDate, 1);

        state.adjacentDateBookings = typeof bookingHelpers.syncAdjacentDateBookings === 'function'
          ? bookingHelpers.syncAdjacentDateBookings(state.adjacentDateBookings, booking, [prevDate, nextDate])
          : state.adjacentDateBookings;
        state.adjacentDateCounts = {
          [prevDate]: Array.isArray(state.adjacentDateBookings?.[prevDate]) ? state.adjacentDateBookings[prevDate].length : 0,
          [nextDate]: Array.isArray(state.adjacentDateBookings?.[nextDate]) ? state.adjacentDateBookings[nextDate].length : 0
        };
        renderServiceDateControls();
      }

      function updateBookingStage(bookingId, newStage) {
        state.bookings = typeof bookingHelpers.applyStageUpdateToBookings === 'function'
          ? bookingHelpers.applyStageUpdateToBookings(state.bookings, bookingId, newStage)
          : state.bookings;
        refreshUi();
      }

      // Play Notification
      function playNotification(booking) {
        // Vibration (mandatory)
        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }

        // Sound (optional)
        if (state.soundEnabled) {
          playSound();
        }
      }

      function playSound() {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.2);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
      }

      // Render Feed
      function renderFeed() {
        const visibleBookings = getVisibleBookings();
        if (visibleBookings.length === 0) {
          appFeed.innerHTML = `<div class="empty-state">${getEmptyStateMessage()}</div>`;
          return;
        }

        if (state.activeFilter === 'hot') {
          const pendingItems = visibleBookings.filter((booking) => booking.stage === 'pending');
          const overdueConfirmedItems = visibleBookings.filter((booking) => booking.stage === 'confirmed');

          appFeed.innerHTML = [
            renderHotQueueSubsection('Pending first', pendingItems),
            renderHotQueueSubsection('Overdue arrivals', overdueConfirmedItems)
          ].filter(Boolean).join('');

          attachQueueEventListeners();
          return;
        }

        if (state.activeFilter === 'arrivals') {
          appFeed.innerHTML = renderArrivalsLane(visibleBookings);
          attachQueueEventListeners();
          return;
        }

        const groups = [
          { key: 'pending', label: 'Needs confirmation' },
          { key: 'confirmed', label: 'Expected soon' },
          { key: 'arrived', label: 'On site now' },
          { key: 'noshow', label: 'No-show' },
          { key: 'cancelled', label: 'Cancelled' },
          { key: 'done', label: 'Completed' }
        ];

        const sections = groups
          .map((group) => {
            const items = visibleBookings.filter((booking) => booking.stage === group.key);
            if (!items.length) return '';

            const content = group.key === 'confirmed'
              ? renderConfirmedQueue(items)
              : items.map((booking) => renderBookingCard(booking)).join('');
            const isCollapsed = isSectionCollapsed(group.key);

            return `
              <section class="queue-section">
                <div class="queue-section-header">
                  <strong>${group.label}</strong>
                  <div style="display:flex;align-items:center;gap:0.45rem;">
                    <span>${items.length} booking${items.length === 1 ? '' : 's'}</span>
