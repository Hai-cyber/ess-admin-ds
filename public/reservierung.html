<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ESSKULTUR - Restaurant Reservierung">
  <title>Tisch reservieren - ESSKULTUR</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f8f8;
      min-height: 100vh;
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    iframe {
      flex: 1;
      min-height: 400px;
      border: none;
      border-radius: 0;
      background: #fff;
    }

    .footer {
      text-align: center;
      padding: 16px;
      color: #999;
      font-size: 0.75rem;
      background: #f8f8f8;
    }

    .footer a {
      color: #666;
      text-decoration: none;
      margin: 0 4px;
    }

    @media (max-width: 480px) {
      .page-container { padding: 0; }
      iframe { border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="page-container">
      <iframe id="booking-form-frame" src="/booking-form.html" scrolling="no"></iframe>
    </div>
    <div class="footer">
      ESSKULTUR · <a href="/">Website</a> · <a href="/kontakt">Kontakt</a> · <a href="/impressum">Impressum</a>
    </div>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data.type === 'IFRAME_HEIGHT') {
        const frame = document.getElementById('booking-form-frame');
        frame.style.minHeight = (e.data.height + 10) + 'px';
      }
    });
  </script>
</body>
</html>
